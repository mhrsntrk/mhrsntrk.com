tr: Tay sikildiği çayırı özlermiş.
variants: []
literal_en: The foal, the meadow where it was fucked, is said to miss.
meaning_en: >-
  Attachment forms at the site of formative experience without
  consulting the experience's valence. What was endured in a place converts, in
  memory, into longing for the place.
meaning_tr: "Kötü anının yaşandığı mekâna bile bağlanılır."
register: obscene
usage: Deployed at nostalgia for a time or place that treated the nostalgic badly.
