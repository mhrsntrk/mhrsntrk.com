slug: kuru-bok-gote-yapismaz
tr: Kuru bok göte yapışmaz.
variants: []
literal_en: Dry shit to the ass does not stick.
meaning_en: >-
  An accusation requires moisture; substance, plausibility,
  something for adhesion. The charge without basis makes contact and falls off,
  leaving the target as it found him.
meaning_tr: "Asılsız suçlama tutmaz."
register: crude
usage: Deployed as reassurance to the baselessly accused, or dismissal of the accusation.
equivalents:
  - Mud does not stick to a clean wall.
cross_refs: []
origin: unattested
themes: [hypocrisy, fate]
related: []
