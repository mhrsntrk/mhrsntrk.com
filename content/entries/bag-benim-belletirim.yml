slug: bag-benim-belletirim
tr: Bağ benim, belletirim; göt benim, elletirim.
variants: []
literal_en: The vineyard is mine, I have it hoed; the ass is mine, I have it groped.
meaning_en: >-
  Ownership includes the right of disposal, and the owner does
  not submit the disposal for approval. The two clauses differ only in asset
  class; the property logic is identical, which is the argument.
meaning_tr: "Mal sahibinin malını nasıl kullanacağı kimseyi ilgilendirmez."
register: obscene
usage: Deployed to terminate third-party commentary on a first-party decision.
