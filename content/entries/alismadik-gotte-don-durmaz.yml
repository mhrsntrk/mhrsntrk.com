slug: alismadik-gotte-don-durmaz
tr: Alışmadık götte don durmaz.
variants: []
literal_en: On the unaccustomed ass, underpants do not stay.
meaning_en: >-
  Acquisitions unsupported by habit do not persist. Comfort,
  wealth, or station granted to a constitution not trained to hold them will be
  shed by that constitution itself, without external cause.
meaning_tr: "Alışkın olmayan, sahip olduğu nimeti elinde tutamaz."
register: crude
usage: Deployed when a windfall is visibly unraveling in the hands of its recipient.
equivalents: []
cross_refs: []
origin: unattested
themes: [money, fate]
related: []
