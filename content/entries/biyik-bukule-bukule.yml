slug: biyik-bukule-bukule
tr: Bıyık büküle büküle kaytan, insan sikile sikile şeytan olur.
variants: []
literal_en: The moustache, being twisted and twisted, becomes cord; the man, being fucked and fucked, becomes the devil.
meaning_en: >-
  Repetition is formative regardless of what is repeated. The
  moustache is shaped by grooming, the man by abuse; both processes are gradual,
  cumulative, and irreversible, and only one of them was voluntary.
meaning_tr: "İnsan yedikçe kazığı, sonunda kurnazlaşır ve acımasızlaşır."
register: obscene
usage: Deployed to explain how a onetime innocent became the sharpest operator in the room.
