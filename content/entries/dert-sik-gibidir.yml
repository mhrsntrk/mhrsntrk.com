slug: dert-sik-gibidir
tr: Dert sik gibidir, kendininkini en büyük zannedersin.
variants: []
literal_en: Trouble is like a dick; your own you suppose the biggest.
meaning_en: >-
  Suffering is estimated egocentrically. Each subject has
  privileged access to one instance only, and systematically ranks that instance
  first; the comparison class is never actually consulted.
meaning_tr: "Herkes kendi derdini herkesinkinden büyük sanır."
register: obscene
usage: Deployed to deflate a monologue of complaint delivered to an audience with worse problems.
equivalents: []
cross_refs:
  - Ross & Sicoly, 1979.
origin: unattested
themes: [self-perception, ego]
related: [el-sikini-gormeyen, sikinde-iki-damla-sut]
