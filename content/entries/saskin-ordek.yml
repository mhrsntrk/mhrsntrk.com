slug: saskin-ordek
tr: Şaşkın ördek götün götün yüzermiş.
variants: []
literal_en: The bewildered duck, ass-first ass-first, is said to swim.
meaning_en: >-
  Confusion does not halt motion; it reverses its orientation.
  The duck continues to swim, with full effort, in the direction of its own
  tail. Activity is preserved; only progress is lost.
meaning_tr: "Şaşırmış kişi işi tersinden yürütür."
register: crude
usage: Deployed at energetic effort applied in exactly the wrong direction.
equivalents: []
cross_refs: []
origin: unattested
themes: [futility, self-perception]
related: []
