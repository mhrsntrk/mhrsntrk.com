slug: kizini-dovmeyen-dizini-dover
tr: Kızını dövmeyen dizini döver.
variants: []
literal_en: He who beats not his daughter, his own knee beats.
meaning_en: >-
  Discipline withheld now is repurchased later as regret, at interest. The
  proverb prices the omission, not the method; the knee is the creditor of the
  daughter's account.
meaning_tr: "Evladını zamanında terbiye etmeyen, sonra pişmanlık duyar."
register: mild
usage: Historically deployed to justify strict upbringing; today mostly quoted to argue about itself.
equivalents:
  - Spare the rod and spoil the child.
cross_refs:
  - Proverbs 13:24.
origin: attested
themes: [kinship]
related: []
