slug: ayagini-yorganina-gore-uzat
tr: Ayağını yorganına göre uzat.
variants:
  - Ayağını yorganına göre uzatmak.
literal_en: Your foot, according to your quilt, stretch.
meaning_en: >-
  Expenditure is to be dimensioned to means. The quilt is prior;
  the foot adjusts. Reversing the order does not lengthen the quilt, it exposes
  the foot.
meaning_tr: "Harcamanı bütçene göre ayarla."
register: mild
usage: Deployed as budgetary counsel, usually to someone mid-stretch.
equivalents:
  - Cut your coat according to your cloth.
cross_refs: []
origin: attested
themes: [money]
