slug: armudun-iyisini-ayilar-yer
tr: Armudun iyisini ayılar yer.
variants:
  - Armudun iyisini ayı yer.
literal_en: The good of the pear, the bears eat.
meaning_en: >-
  Allocation of the best goods does not run through merit or
  refinement. The bear neither cultivated the orchard nor can grade the fruit;
  it is simply positioned to take, and takes.
meaning_tr: "En iyi şeyler, hak edene değil gücü yetene gider."
register: mild
usage: Deployed at the sight of a prize in the possession of someone who cannot appreciate it.
equivalents: []
cross_refs: []
origin: attested
themes: [fate, money]
related: []
