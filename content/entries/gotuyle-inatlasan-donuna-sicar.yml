slug: gotuyle-inatlasan-donuna-sicar
tr: Götüyle inatlaşan donuna sıçar.
variants: []
literal_en: He who with his own ass enters a stubbornness contest, into his underpants shits.
meaning_en: >-
  Contesting a function one depends on guarantees that the damage
  of the contest falls on oneself. Stubbornness against one's own faculties has a
  single possible loser.
meaning_tr: "Kendiyle inat eden zararı yine kendi görür."
register: crude
usage: Deployed against someone escalating a conflict in which every cost lands on themselves.
equivalents:
  - Cutting off your nose to spite your face.
