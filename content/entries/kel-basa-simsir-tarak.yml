slug: kel-basa-simsir-tarak
tr: Kel başa şimşir tarak.
variants: []
literal_en: For the bald head, a boxwood comb.
meaning_en: >-
  Expenditure on the accessory where the fundamental is absent.
  The comb is of the finest wood and combs nothing; the purchase satisfies the
  wish to be the kind of person who owns it, not any function.
meaning_tr: "İhtiyacı yokken lüks ürünlere para yatırmak."
register: mild
usage: Deployed at luxury spending that presupposes a capacity the spender lacks.
equivalents: []
cross_refs: []
origin: attested
themes: [money, futility]
related: [ayrani-yok-icmeye]
