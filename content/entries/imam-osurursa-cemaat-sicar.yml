slug: imam-osurursa-cemaat-sicar
tr: İmam osurursa cemaat sıçar.
variants: []
literal_en: The imam if farts, the congregation shits.
meaning_en: >-
  A leader's minor transgression licenses proportionally larger
  transgressions among followers. Misconduct does not merely propagate downward
  through a hierarchy; it amplifies.
meaning_tr: "Liderin yaptığı yanlış, ona bağlı olanlarda büyüyerek tekrarlanır."
register: crude
usage: Deployed when an authority figure's small lapse is being cited to excuse widespread misconduct below.
equivalents:
  - A fish rots from the head down.
