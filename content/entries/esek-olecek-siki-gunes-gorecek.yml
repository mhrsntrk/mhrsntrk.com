slug: esek-olecek-siki-gunes-gorecek
tr: Eşek ölecek de sırt üstü dönecek de siki güneş görecek.
variants: []
literal_en: The donkey will die, and onto its back will turn, and its dick the sun will see.
meaning_en: >-
  A plan whose payoff requires a chain of contingencies, each
  improbable, each outside the planner's control. The proverb prices such
  expectation at the value of a dead donkey's sunbathing.
meaning_tr: "Olmayacak şartlara bağlanmış beklentiyi alaya alır."
register: obscene
usage: Deployed at a hope whose preconditions enumerate like an actuarial joke.
