slug: tuzu-kuru
tr: Tuzu kuru.
variants: []
literal_en: His salt is dry.
meaning_en: >-
  Insulation from the general condition. The subject's stores are
  safe, and his commentary on the hardships of others is priced accordingly; the
  idiom is fastened to those who counsel patience from inside a full pantry.
meaning_tr: "Sıkıntıdan uzak, rahatı yerinde olan; başkasının derdini bilmez."
register: mild
usage: Deployed at advice about hardship delivered by someone experiencing none of it.
equivalents: []
cross_refs: []
origin: attested
themes: [money, hypocrisy]
related: [ayrani-yok-icmeye]
