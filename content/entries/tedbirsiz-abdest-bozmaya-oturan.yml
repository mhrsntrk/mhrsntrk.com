slug: tedbirsiz-abdest-bozmaya-oturan
tr: Tedbirsiz abdest bozmaya oturan, domala domala taş arar.
variants: []
literal_en: He who without precaution to relieve himself sits, crouching and crouching a stone seeks.
meaning_en: >-
  Preparation omitted before the act is repurchased during it, in
  a worse posture and at a worse price. The stone was available in advance; the
  search for it was not always this undignified.
meaning_tr: "Hazırlıksız işe girişen, iş ortasında rezil biçimde çare arar."
register: crude
usage: Deployed at improvisation whose necessity was entirely foreseeable.
equivalents:
  - Look before you leap.
cross_refs: []
origin: unattested
themes: [futility, labour]
related: [gote-kacan-semsiye-acilmaz]
