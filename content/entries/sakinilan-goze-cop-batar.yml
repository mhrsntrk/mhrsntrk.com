slug: sakinilan-goze-cop-batar
tr: Sakınılan göze çöp batar.
variants: []
literal_en: Into the guarded eye, the speck sinks.
meaning_en: >-
  Protection attracts precisely the harm it organizes against.
  The proverb observes an inverse relation between vigilance and outcome, without
  offering a mechanism; the guarded eye is the one the speck finds.
meaning_tr: "Üzerine titrenilen şey, kaçınılan belayı bulur."
register: mild
usage: Deployed when an elaborately protected thing fails in exactly the anticipated way.
equivalents: []
cross_refs:
  - Wegner, 1994.
origin: attested
themes: [fate, futility]
related: []
