slug: bugun-yedigin-hurmalar
tr: Bugün yediğin hurmalar gelir götünü tırmalar.
variants: []
literal_en: The dates you eat today come and your ass scratch.
meaning_en: >-
  Consumption and consequence are one transaction separated by
  time. The pleasant half is taken first and voluntarily; the unpleasant half
  arrives on its own schedule and is not optional.
meaning_tr: "Bugünkü keyfin bedeli yarın bir biçimde ödenir."
register: crude
usage: Deployed as a warning at the moment of indulgence, or as an epitaph after it.
equivalents:
  - As you sow, so shall you reap.
cross_refs:
  - Galatians 6:7.
origin: unattested
themes: [fate]
related: []
