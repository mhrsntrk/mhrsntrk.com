slug: seytanin-sikini-bileyledigi-yer
tr: Şeytanın sikini bileylediği yer.
variants: []
literal_en: The place where the devil his dick sharpens.
meaning_en: >-
  A location of such remoteness that its only documented economic
  activity is the devil's private maintenance. The idiom assigns the address; it
  does not explain what the addressee is doing there.
meaning_tr: "Aşırı ücra, ıssız yer."
register: obscene
usage: Deployed as the answer to where something inconveniently far away is.
equivalents:
  - The middle of nowhere.
  - Where the devil says good night.
