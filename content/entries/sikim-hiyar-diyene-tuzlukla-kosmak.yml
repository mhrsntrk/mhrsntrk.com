slug: sikim-hiyar-diyene-tuzlukla-kosmak
tr: Sikim hıyar diyene tuzlukla koşmak.
variants:
  - Sikim hıyar diyene, bir avuç tuzla koşuyorsun.
literal_en: To him who says "my dick is a cucumber," with a saltshaker to run.
meaning_en: >-
  Uncritical eagerness to service another's self-description. The
  runner has accepted an absurd premise and volunteered the condiment; the error
  is not the claim but the speed of the accommodation.
meaning_tr: "Birinin abartılı iddiasını sorgusuzca kabul edip hizmetine koşmak."
register: obscene
usage: Deployed against sycophancy toward a claim that did not survive inspection.
