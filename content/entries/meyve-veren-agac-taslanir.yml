slug: meyve-veren-agac-taslanir
tr: Meyve veren ağaç taşlanır.
variants: []
literal_en: The tree that fruit gives, is stoned.
meaning_en: >-
  Attack selects for productivity. Stones are thrown to bring
  down fruit, so their distribution maps yield, not fault; the barren tree's
  peace is the absence of anything worth taking.
meaning_tr: "Verimli ve başarılı olan hedef alınır."
register: mild
usage: Deployed to reframe criticism as evidence of the criticized party's worth.
equivalents:
  - The nail that sticks out gets hammered down.
cross_refs:
  - Tall poppy syndrome.
origin: attested
themes: [ego, hypocrisy]
related: []
