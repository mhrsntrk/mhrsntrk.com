slug: konya-ovasinda-sicacak-yer-bulamamak
tr: Konya ovasında sıçacak yer bulamamak.
variants: []
literal_en: On the Konya plain, a place to shit not to be able to find.
meaning_en: >-
  Paralysis of choice under maximal freedom. The plain is flat,
  empty, and entirely available; the failure is not in the terrain but in the
  chooser, for whom abundance of options performs as scarcity.
meaning_tr: "Sonsuz imkân içinde karar verememek."
register: crude
usage: Deployed at indecision that survives the removal of every constraint.
equivalents: []
cross_refs:
  - Schwartz, The Paradox of Choice, 2004.
origin: unattested
themes: [futility, self-perception]
related: []
