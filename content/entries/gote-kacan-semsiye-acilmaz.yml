slug: gote-kacan-semsiye-acilmaz
tr: Göte kaçan şemsiye açılmaz.
variants:
  - Göte giren şemsiye açılmaz.
literal_en: The umbrella that into the ass has escaped does not open.
meaning_en: >-
  Certain positions, once entered, forbid the deployment of the
  very instrument that would relieve them. Options must be exercised before
  commitment, not after.
meaning_tr: "İş işten geçtikten sonra çare işlemez; tedbir baştan alınır."
register: crude
usage: Deployed when a remedy is proposed past the point at which it could operate.
