slug: sikmeyecegin-esegin-onune-ot-atilmaz
tr: Sikmeyeceğin eşeğin önüne ot atılmaz.
variants:
  - Sikmeyeceği eşeğin önüne ot koymamak.
literal_en: Before the donkey you will not fuck, grass is not thrown.
meaning_en: >-
  Investment without intent to follow through wastes the
  investment and misleads the recipient. Resources track commitments; courtship
  without a program is expenditure without a return.
meaning_tr: "Sonunu getirmeyeceğin işe yatırım yapılmaz, boş umut verilmez."
register: obscene
usage: Deployed against cultivating expectations one has no intention of meeting.
