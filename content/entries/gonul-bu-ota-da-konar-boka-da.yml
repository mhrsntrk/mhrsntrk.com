slug: gonul-bu-ota-da-konar-boka-da
tr: Gönül bu, ota da konar boka da konar.
variants: []
literal_en: The heart is this; on grass it also alights, on shit it also alights.
meaning_en: >-
  Affection does not take quality as an argument. The heart is
  modelled as a fly: its landings are observed facts, not evaluations, and no
  inference from the beloved's merit to the lover's judgment is licensed.
meaning_tr: "Sevgi iradeye ve kaliteye bakmaz."
register: crude
usage: Deployed to absolve an inexplicable attachment, one's own or another's.
equivalents:
  - Love is blind.
cross_refs: []
origin: unattested
themes: [fate]
related: []
