slug: ayrani-yok-icmeye
tr: Ayranı yok içmeye, tahtırevanla gider sıçmaya.
variants: []
literal_en: Ayran he has not for drinking; by palanquin he goes for shitting.
meaning_en: >-
  Expenditure on display in inverse proportion to means. The
  subject lacks the staple and finances the ceremony; consumption is ordered by
  audience, not need.
meaning_tr: "Temel ihtiyacını karşılayamazken gösterişe para dökmek."
register: crude
usage: Deployed against conspicuous consumption financed from an empty pantry.
equivalents:
  - Champagne taste on a beer budget.
cross_refs:
  - Veblen, The Theory of the Leisure Class, 1899.
origin: unattested
themes: [money, ego]
related: [tuzu-kuru]
