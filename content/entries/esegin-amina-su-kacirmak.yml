slug: esegin-amina-su-kacirmak
tr: Eşeğin amına su kaçırmak.
variants: []
literal_en: Into the donkey's cunt, water to leak.
meaning_en: >-
  To extend a task past every point at which any party benefits.
  The idiom marks the region beyond thoroughness where effort continues but its
  object has stopped registering it.
meaning_tr: "İşi gereksiz yere abartmak, aşırıya kaçmak."
register: obscene
usage: Deployed when refinement continues on work whose recipients stopped caring several iterations ago.
equivalents:
  - To gild the lily.
cross_refs:
  - Shakespeare, King John, IV.ii.
origin: unattested
themes: [futility, labour]
related: []
