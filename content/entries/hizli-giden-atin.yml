slug: hizli-giden-atin
tr: Hızlı giden atın boku seyrek düşer.
variants: []
literal_en: Of the fast-going horse, the shit falls sparse.
meaning_en: >-
  Haste degrades the work it accelerates. The fast horse covers more ground and
  marks it worse; what is gained in pace is deducted, without negotiation, from
  the result.
meaning_tr: "Aceleyle yapılan işin kötü biter."
register: crude
usage: Deployed at output whose pace was visibly purchased with its depth.
equivalents:
  - More haste, less speed.
