slug: azimle-sican-mermeri-deler
tr: Azimle sıçan mermeri deler.
variants:
  - Azimle sıçan beton deler.
literal_en: He who with determination shits, the marble pierces.
meaning_en: >-
  Persistence stated as a physical law and pushed to a substrate
  where the law embarrasses itself. The form parodies the perseverance maxim
  while conceding its content: applied long enough, even the weakest force marks
  the hardest surface.
meaning_tr: "Kararlılıkla sürdürülen iş, en olmayacak durumda bile sonuç verir."
register: crude
usage: Deployed to encourage, or to mock the encouragement, depending entirely on delivery.
equivalents:
  - Constant dripping wears away the stone.
cross_refs:
  - Ovid, Epistulae ex Ponto, IV.10.
origin: unattested
themes: [labour, futility]
related: [damlaya-damlaya-gol-olur]
