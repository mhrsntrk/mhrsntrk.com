slug: sikilmis-gotun-davasi-olmaz
tr: Sikilmiş götün davası olmaz.
variants: []
literal_en: Of the fucked ass, a lawsuit there is not.
meaning_en: >-
  Once a loss has been consummated, litigation of it is pointless.
  The proverb denies standing to grievances whose subject matter is already
  irreversible.
meaning_tr: "Olan olduktan sonra hak aramanın anlamı kalmaz."
register: obscene
usage: Deployed to close a complaint about an outcome that can no longer be altered.
equivalents:
  - It is no use crying over spilt milk.
cross_refs: []
origin: unattested
themes: [futility, fate]
related: [gote-kacan-semsiye-acilmaz]
