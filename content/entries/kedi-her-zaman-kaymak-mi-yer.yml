slug: kedi-her-zaman-kaymak-mi-yer
tr: Kedi her zaman kaymak mı yer? Bazen de değnek yer.
variants: []
literal_en: Does the cat always cream eat? Sometimes also the stick it eats.
meaning_en: >-
  A run of impunity is a sampling artifact. The cat's diet,
  observed long enough, includes the stick; the proverb corrects an inference
  drawn from the cream-only interval.
meaning_tr: "Her seferinde yanına kâr kalmaz; bir gün bedeli ödenir."
register: mild
usage: Deployed when a habitual chancer finally meets a consequence.
