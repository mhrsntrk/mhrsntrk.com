slug: hesabini-bilmeyen-cavuslar
tr: Hesabını bilmeyen çavuşlar döner götünü avuçlar.
variants:
  - İşlerini bilmeyen çavuşlar sıçar bokunu avuçlar.
literal_en: Sergeants who their accounting know not, turn and their own ass cup with their palms.
meaning_en: >-
  Authority without administration ends in self-service of the
  least dignified kind. Rank does not exempt its holder from arithmetic; it only
  raises the visibility of the failure.
meaning_tr: "İşini ve hesabını bilmeyen sonunda rezil olur."
register: crude
usage: Deployed at the audit stage of a project run on confidence instead of bookkeeping.
