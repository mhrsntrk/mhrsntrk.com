slug: bok-boku-kenefte-bulur
tr: Bok boku kenefte bulur.
variants: []
literal_en: Shit finds shit in the latrine.
meaning_en: >-
  Affinity sorts agents into their common venue. Neither party
  sought the other; both sought the setting, and the setting performed the
  introduction. Association is read as diagnosis.
meaning_tr: "Kötüler birbirini kendilerine uygun yerde bulur."
register: crude
usage: Deployed upon learning that two disliked parties have discovered each other.
equivalents:
  - Birds of a feather flock together.
