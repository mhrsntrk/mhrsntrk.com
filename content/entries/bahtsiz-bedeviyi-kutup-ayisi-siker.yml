slug: bahtsiz-bedeviyi-kutup-ayisi-siker
tr: Bahtsız bedeviyi çölde kutup ayısı siker.
variants: []
literal_en: The luckless bedouin, in the desert a polar bear fucks.
meaning_en: >-
  For the sufficiently unlucky, misfortune is not bound by
  probability. The proverb constructs an event of near-zero base rate and assigns
  it anyway; bad luck, at the limit, manufactures its own impossible causes.
meaning_tr: "Talihsiz kişiyi olmayacak yerde olmayacak felaket bulur."
register: obscene
usage: Deployed after a misfortune so statistically improbable that explanation is abandoned.
equivalents:
  - Murphy's law.
cross_refs: []
origin: unattested
themes: [fate]
