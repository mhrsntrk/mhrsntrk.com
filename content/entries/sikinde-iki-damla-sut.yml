slug: sikinde-iki-damla-sut
tr: Sikinde iki damla süt gördün diye kendini mandıra sahibi sanma.
variants: []
literal_en: Because on your dick two drops of milk you saw, yourself a dairy owner do not suppose.
meaning_en: >-
  A first, marginal output does not license an inference to
  ownership of the category. The proverb addresses the scaling error directly:
  the sample is two drops, and the claimed enterprise is a dairy.
meaning_tr: "Küçücük bir başarıyla kendini o işin ustası sanma."
register: obscene
usage: Deployed against a beginner extrapolating a title from a first result.
equivalents:
  - One swallow does not a summer make.
cross_refs:
  - Dunning & Kruger, 1999.
  - Aristotle, Nicomachean Ethics, I.7.
origin: unattested
themes: [ego, self-perception]
related: [el-sikini-gormeyen, dert-sik-gibidir]
