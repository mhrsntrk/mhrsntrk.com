slug: sinek-avlamak
tr: Sinek avlamak.
variants: []
literal_en: Flies, to hunt.
meaning_en: >-
  The occupation of a business without customers. The hunter is
  at his post, the equipment is in order, and the quarry is flies; commerce
  reduced to its posture with the commerce removed.
meaning_tr: "İş yerinde müşteri beklemek, işsiz oturmak."
register: mild
usage: Deployed to describe a shopfront, or a calendar, that has been empty for some time.
equivalents: []
cross_refs: []
origin: attested
themes: [labour, money]
related: [bos-kalan-bakkal-tasaklarini-tartar]
