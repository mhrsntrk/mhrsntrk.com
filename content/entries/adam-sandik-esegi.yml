tr: Adam sandık eşeği, alnımıza değdi taşağı.
variants:
  - Adam sandık eşşe anlımıza deydi daşşa.
literal_en: A man we supposed the donkey; against our forehead struck its testicle.
meaning_en: >-
  Misplaced esteem is repaid in proportion to the intimacy it
  granted. The error is the observer's own: the donkey did not claim to be a man,
  and the resulting anatomy lesson was administered at the distance the esteem
  had closed.
meaning_tr: "Değer verilmeyecek kişiye değer veren, bedelini öder."
register: obscene
usage: Deployed in the aftermath of trust extended on appearance and refunded in humiliation.
