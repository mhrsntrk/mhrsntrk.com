slug: bilmiyorsan-gotunun-huyunu
tr: Bilmiyorsan götünün huyunu, içmeyeceksin turşunun suyunu.
variants: []
literal_en: If you know not your ass's temperament, you shall not drink the pickle's juice.
meaning_en: >-
  Undertakings must be sized to a capacity one has actually
  measured. Ignorance of one's own constitution does not excuse the wager placed
  on it; the consequences will perform the measurement regardless.
meaning_tr: "Kaldırma gücünü bilmediğin işe girişme."
register: crude
usage: Deployed after an ambitious commitment collides with an unexamined limitation.
equivalents:
  - Know thyself.
cross_refs:
  - The Delphic maxim γνῶθι σεαυτόν.
origin: unattested
themes: [self-perception]
related: []
