slug: kopruyu-gecene-kadar
tr: Köprüyü geçene kadar ayıya dayı diyeceksin.
variants:
  - Köprüyü geçinceye kadar ayıya dayı derler.
literal_en: Until the bridge you have crossed, to the bear "uncle" you shall say.
meaning_en: >-
  Deference is a toll, paid in address and withdrawn at the far
  bank. The proverb licenses temporary flattery of power for exactly the duration
  of one's exposure to it, and not one step further.
meaning_tr: "İşin bitene kadar güçlüye katlanır, gönlünü hoş tutarsın."
register: mild
usage: Deployed to explain a courtesy that will expire with the dependency that produced it.
equivalents: []
cross_refs: []
origin: attested
themes: [hypocrisy]
related: []
