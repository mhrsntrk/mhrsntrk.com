literal_en: The camel, the thorn; the man, the fuck fells.
meaning_en: >-
  Each constitution has its specific undoing, and it is smaller than the
  constitution. The camel survives the desert and falls to a thorn; the man's
  analogous minimum is given.
meaning_tr: "Her canlıyı deviren kendi küçük zaafıdır."
register: obscene
usage: Deployed when something large is brought down by something specific and small.
equivalents:
