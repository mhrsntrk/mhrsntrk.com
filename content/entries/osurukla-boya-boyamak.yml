slug: osurukla-boya-boyamak
tr: Osurukla boya boyamak.
variants: []
literal_en: With a fart, paint to paint.
meaning_en: >-
  Undertaking work with means categorically unequal to it. The
  idiom does not say the work is hard; it says the proposed instrument is not an
  instrument.
meaning_tr: "Yetersiz araçla iş görmeye kalkışmak."
register: crude
usage: Deployed at a plan whose budget, tooling, or staffing is a rounding error of the requirement.
equivalents:
  - You cannot make bricks without straw.
cross_refs:
  - Exodus 5.
origin: unattested
themes: [futility, labour]
