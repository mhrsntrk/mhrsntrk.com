slug: bos-kalan-bakkal-tasaklarini-tartar
tr: Boş kalan bakkal taşaklarını tartar.
variants:
  - İşsiz bakkal taşaklarını tartarmış.
  - Aylak bakkal taşaklarını tartar.
literal_en: The grocer left idle, his own testicles weighs.
meaning_en: >-
  An instrument without work will find work of no value. Idle
  capacity does not rest; it self-applies, and the output is worth exactly what
  the customer base implies.
meaning_tr: "İşsiz kalan, elindeki düzeneği boş işlerde kullanır."
register: crude
usage: Deployed at the sight of elaborate effort expended on a task that matters to no one.
equivalents:
  - Idle hands are the devil's workshop.
cross_refs: []
origin: unattested
themes: [labour, futility]
related: [sinek-avlamak]
