slug: iki-cambaz-bir-ipte-oynamaz
tr: İki cambaz bir ipte oynamaz.
variants: []
literal_en: Two acrobats on one rope do not perform.
meaning_en: >-
  A niche predicated on singular skill admits one occupant.
  Where two schemers meet on the same ground, the ground itself fails; expertise
  of this kind does not share infrastructure.
meaning_tr: "İki kurnaz aynı alanda birlikte iş göremez."
register: mild
usage: Deployed at the formation, or the collapse, of a partnership between two operators.
equivalents:
  - Two of a trade seldom agree.
cross_refs: []
origin: attested
themes: [ego, labour]
