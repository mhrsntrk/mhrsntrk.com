slug: damlaya-damlaya-gol-olur
tr: Damlaya damlaya göl olur.
variants: []
literal_en: Dripping and dripping, a lake becomes.
meaning_en: >-
  Accumulation is indifferent to the size of its increments.
  Sufficient repetition converts the negligible into the substantial; the drop
  needs no ambition, only continuation.
meaning_tr: "Küçük birikimler zamanla büyür."
register: mild
usage: Deployed in defense of small, regular contributions against grand, deferred plans.
equivalents:
  - Little strokes fell great oaks.
  - Many a mickle makes a muckle.
cross_refs:
  - Franklin, Poor Richard's Almanack.
origin: attested
themes: [money, labour]
related: [azimle-sican-mermeri-deler]
