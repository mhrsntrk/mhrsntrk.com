slug: bir-sikilmedik-kulagimizin-arkasi-kaldi
tr: Bir sikilmedik kulağımızın arkası kaldı.
variants:
  - Sikilmedik bir kulak arkası kaldı.
literal_en: One unfucked place has remained to us, the back of our ear.
meaning_en: >-
  An inventory of exploitation approaching completeness. The
  speaker reports that of all that could be taken, one absurd remainder survives;
  the accounting is of exhaustion, not of hope.
meaning_tr: "Sömürülmedik, zarar görmedik yer kalmadığını bildirir."
register: obscene
usage: Deployed after the latest in a long series of impositions, in anticipation of the next.
equivalents: []
cross_refs: []
origin: unattested
themes: [fate, futility]
