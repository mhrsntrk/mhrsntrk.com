slug: istemem-yan-cebime-koy
tr: İstemem, yan cebime koy.
variants: []
literal_en: I want it not; into my side pocket put it.
meaning_en: >-
  Refusal as choreography. The mouth declines while the pocket is
  presented; the idiom documents the standard mechanism by which propriety and
  appetite are satisfied in a single gesture.
meaning_tr: "Sözde reddedip fiilen kabul etmek; yapmacık tokgözlülük."
register: mild
usage: Deployed at a declined offer whose decliner is visibly tracking the offer's location.
equivalents:
  - The lady doth protest too much, methinks.
cross_refs:
  - Shakespeare, Hamlet, III.ii.
origin: attested
themes: [hypocrisy, money]
related: []
