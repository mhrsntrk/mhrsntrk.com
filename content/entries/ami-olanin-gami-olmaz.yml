slug: ami-olanin-gami-olmaz
tr: Amı olanın gamı olmaz.
variants: []
literal_en: She who a cunt has, sorrow has not.
meaning_en: >-
  The holder of a permanently demanded asset is exempt from
  scarcity. The proverb states a market position: where demand is structural,
  the supplier does not experience downturns.
meaning_tr: "Elinde her zaman değerli bir şeyi olanın derdi olmaz."
register: obscene
usage: Deployed, with resentment, about anyone whose assets renew their own demand.
