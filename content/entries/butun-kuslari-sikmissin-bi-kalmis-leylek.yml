slug: butun-kuslari-sikmissin-bi-kalmis-leylek
tr: Bütün kuşları sikmişsin, bi kalmış leylek.
variants:
  - Her kuşu siktik, bir leylek kaldı.
literal_en: All the birds you have fucked; one has remained, the stork.
meaning_en: >-
  Directed at one who, having exhausted every available excess,
  presents the single remaining item as a necessity. The completed record
  discredits the claimed need.
meaning_tr: "Her şeyi yapıp bitirmişken kalan son şeyi bahane edene söylenir."
register: obscene
usage: Deployed against a demand whose author's own history makes it indefensible.
