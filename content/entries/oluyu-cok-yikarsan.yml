slug: oluyu-cok-yikarsan
tr: Ölüyü çok yıkarsan ya osurur ya sıçar.
variants: []
literal_en: The corpse if you wash too much, either it farts or it shits.
meaning_en: >-
  Processing continued past completion does not add polish; it
  reopens the matter, and what emerges is worse than what the processing was
  meant to dignify. Closed things are to be left closed.
meaning_tr: "Bitmiş işi fazla kurcalarsan içinden kötü şey çıkar."
register: crude
usage: Deployed against reopening a settled matter for one more round of improvement.
equivalents:
  - Let sleeping dogs lie.
cross_refs: []
origin: unattested
themes: [futility]
related: [esegin-amina-su-kacirmak]
