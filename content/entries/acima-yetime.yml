slug: acima-yetime
tr: Acıma yetime, döner koyar götüne.
variants:
  - Üzülme yetime, gelir koyar götüne.
literal_en: Pity not the orphan; he turns and puts it into your ass.
meaning_en: >-
  Compassion creates access, and access is spent by its recipient
  without reference to how it was obtained. The proverb does not counsel cruelty;
  it prices the exposure that charity opens.
meaning_tr: "Acıyıp yaklaştırdığın, gün gelir sana zarar verir."
register: crude
usage: Deployed after a beneficiary's ingratitude, by the benefactor, too late.
equivalents:
  - No good deed goes unpunished.
cross_refs: []
origin: unattested
themes: [hypocrisy, fate]
related: []
