slug: fakirin-karni-doyunca
tr: Fakirin karnı doyunca siki kalkarmış.
variants: []
literal_en: The poor man's belly once filled, his dick is said to rise.
meaning_en: >-
  Appetite is serial, not singular. Satisfaction of the basic
  need does not produce rest; it produces the next need, which was waiting for
  the resources the first one released.
meaning_tr: "Temel ihtiyaç karşılanınca sıradaki istek baş gösterir."
register: obscene
usage: Deployed when modest sufficiency graduates, on schedule, into new demands.
equivalents:
  - Appetite comes with eating.
cross_refs:
  - Maslow, 1943.
origin: unattested
themes: [money, fate]
