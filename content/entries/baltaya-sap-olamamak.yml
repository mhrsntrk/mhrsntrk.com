slug: baltaya-sap-olamamak
tr: Baltaya sap olamamak.
variants: [Bir baltaya sap olamamak.]
literal_en: To the axe, a handle not to be able to become.
meaning_en: >-
  Failure to qualify for even the subordinate role. The handle is
  not the axe; it is the axe's assistant, and the subject has been assessed
  against this standard and found under it.
meaning_tr: "En basit işe bile yaramamak."
register: mild
usage: Deployed, usually by relatives, at a career that has not begun by the expected age.
equivalents: []
cross_refs: []
origin: attested
themes: [labour, futility]
related: []
